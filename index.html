<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matric English MCQs</title>
<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:
    radial-gradient(circle,#ffe6f0 1px,transparent 1px),
    linear-gradient(135deg,#ffd6e7,#ffb3d1);
  background-size:18px 18px;
  color:#5a0f33;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* TITLE */
h1{
  text-align:center;
  color:#8a004f;
  text-shadow:0 0 15px #ff7ab8;
}

/* TIMER */
#timer{
  text-align:center;
  font-weight:bold;
  color:red;
  margin-bottom:10px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.4);
  padding:15px;
  margin:15px 0;
  border-radius:15px;
  backdrop-filter:blur(12px);
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  transition:0.3s;
}
.card:hover{
  transform:translateY(-5px) scale(1.01);
}

/* OPTION */
.option{
  display:block;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  background:#fff;
  cursor:pointer;
}
.option:hover{
  background:#ffe0ef;
}

/* BUTTON */
button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:#ff4fa3;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin:10px;
  box-shadow:0 0 15px #ff7ab8;
}

/* RESULT */
#result{
  text-align:center;
  font-size:22px;
  margin-top:20px;
  font-weight:bold;
}

/* HORROR TIMER */
.warning{
  animation:flicker 0.5s infinite;
}
@keyframes flicker{
  0%,100%{opacity:1;}
  50%{opacity:0.3;}
}
</style>
</head>
<body>
<div class="container">
<h1>💖 Matric English MCQs (Complete) 💖</h1>
<div id="timer">20:00</div>
<form id="quiz"></form>
<center>
<button onclick="submitQuiz()">Submit</button>
<button onclick="location.reload()">Reset</button>
</center>
<div id="result"></div>
</div>
<script>

const questions = [

{q:"The teacher teaches us grammar.",options:["teach","teaches","teaching","taught"],answer:"b"},
{q:"Speaking gently is something",options:["difficult","small","big","impossible"],answer:"b"},
{q:"Active Voice: My jug has been broken",options:["Someone broke my jug","Someone has broken my jug","They broke","They have broken"],answer:"a"},
{q:'Indirect: "Do not spit here"',options:["He told them","He forbade them to spit there","He asked","He told"],answer:"b"},
{q:"Greenery on ____ of river",options:["right","left","bank","both"],answer:"b"},
{q:"Negative: I have a mobile phone",options:["I have not","I did not have","I does not","I had not"],answer:"b"},
{q:"Direct narration: Man is mortal",options:["Man was mortal","Man is mortal","Man will be","Man has been"],answer:"b"},
{q:"Helmet increases chances of",options:["damage","accidents","loss","severe injuries"],answer:"d"},
{q:"Sun below ___ horizon",options:["the","a","an","none"],answer:"a"},
{q:"Spider attempt",options:["eight","tenth","ninth","eleventh"],answer:"b"},
{q:"Father died ___ cancer",options:["from","in","by","of"],answer:"d"},
{q:"Social media cause",options:["BP","obesity","attack","none"],answer:"b"},
{q:"We ___ her yesterday",options:["see","saw","seen","had seen"],answer:"b"},
{q:"Indirect: Let us go",options:["should","advised","proposed","requested"],answer:"c"},
{q:"Developed countries ___ dignity",options:["plan","request","understand","explain"],answer:"c"},
{q:"Antonym of Attack",options:["Defense","Defeat","Defend","Descend"],answer:"a"},
{q:"Correct punctuation",options:["Iqbal died Lahore","Iqbal, the famous poet of Pakistan, died at Lahore","Iqbal died at Lahore","Iqbal died,"],answer:"b"},
{q:"Negative: They drink tea",options:["do not drink","did not","have not","will not"],answer:"a"},
{q:"Main idea",options:["children","young","all people","old"],answer:"c"},
{q:"Passive: I gave him a book",options:["given","He was given","He has given","book given"],answer:"b"},
{q:"Active: novel was not read",options:["They did not read","They do not","They reading","They have not"],answer:"a"},
{q:"Both riders and ___ riders",options:["companion","passenger","pillion","traveller"],answer:"c"},
{q:"Direct narration: He had done his work",options:["I have done my work","I have done your work","He had done","He has done"],answer:"a"},
{q:"House was ___",options:["closed","haunted","sealed","none"],answer:"b"},
{q:"Interrogative: She plays football",options:["Did she play","Does she plays","Will she","Does she play"],answer:"d"},
{q:"Fake virtual ___",options:["companies","offices","machines","none"],answer:"a"},
{q:"Gain first hand ___",options:["information","knowledge","report","detail"],answer:"b"},
{q:"He did as he ___",options:["promise","promises","promised","will"],answer:"c"},
{q:"What clever boy he is!",options:["a","an","the","none"],answer:"a"},
{q:"The dog sat ___ his master",options:["beside","besides","with","none"],answer:"a"}

];

/* LOAD */
const quiz=document.getElementById("quiz");

questions.forEach((q,i)=>{
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<p>${i+1}. ${q.q}</p>
${q.options.map((opt,j)=>
`<label class="option">
<input type="radio" name="q${i}" value="${String.fromCharCode(97+j)}"> ${opt}
</label>`).join("")}
`;

quiz.appendChild(div);
});

/* TIMER */

let interval = setInterval(()=>{
  let m=Math.floor(time/60);
  let s=time%60;
  timer.innerText=`${m}:${s<10?"0"+s:s}`;

  if(time<60) timer.classList.add("warning");

  if(time <= 0){
    clearInterval(interval);
    submitQuiz(); // auto submit
  }

  time--;
},1000);

/* RESULT */
function submitQuiz() {
  let score = 0;

  questions.forEach((q, i) => {

    let options = document.getElementsByName("q" + i);
    let selected = null;

    // find selected
    for (let j = 0; j < options.length; j++) {
      if (options[j].checked) {
        selected = options[j].value;
      }
    }

    // highlight
    for (let j = 0; j < options.length; j++) {
      let opt = options[j];
      let label = opt.parentElement;
      let optionLetter = String.fromCharCode(97 + j);

      label.style.background = "#fff";
      label.style.border = "1px solid #ccc";

      // correct
      if (optionLetter === q.answer) {
        label.style.background = "#c8f7c5";
        label.style.border = "2px solid green";
      }

      // wrong
      if (selected !== null && selected !== q.answer && opt.checked) {
        label.style.background = "#f7c5c5";
        label.style.border = "2px solid red";
      }
    }

    // show correct answer
    let card = options[0].closest(".card");

    let old = card.querySelector(".correctAns");
    if (old) old.remove();

    let ansText = document.createElement("div");
    ansText.className = "correctAns";
    ansText.style.marginTop = "8px";
    ansText.style.fontWeight = "bold";

    ansText.innerHTML = "✔ Correct Answer: " + 
      q.options[q.answer.charCodeAt(0) - 97];

    card.appendChild(ansText);

    // score
    if (selected === q.answer) {
      score++;
    }

  });

  document.getElementById("result").innerText =
    "🎯 Your Score: " + score + " / " + questions.length;
}

</script>
</body>
</html>
